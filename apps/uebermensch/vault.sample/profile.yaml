schema_version: 1

identity:
  name: "Vincent"
  slug: "vincent"
  tz: "Asia/Hong_Kong"
  lang: "en"

budgets:
  daily_usd: 2.00
  per_brief_usd: 0.50
  max_tokens_per_brief: 32000

delivery:
  brief:
    cron: "0 30 7 * * *"
    format: "long"

  channels:
    app:
      enabled: true
      driver: "app"
      target_ref: "default"
      window: { start_local: "00:00", end_local: "23:59", tz: "Asia/Hong_Kong" }
    telegram_primary:
      enabled: false
      driver: "telegram"
      target_ref: "tg:chat:env:TELEGRAM_PRIMARY_CHAT_ID"
      window: { start_local: "08:00", end_local: "22:00", tz: "Asia/Hong_Kong" }
      silent: false
    discord_feed:
      enabled: false
      driver: "discord"
      target_ref: "dc:webhook:env:DISCORD_FEED_URL"

  personas:
    uber-curator: "prompts/uber-curator.md"
    uber-deepdive: "prompts/uber-deepdive.md"

  retention:
    briefs_days: 180
    alerts_days: 90
