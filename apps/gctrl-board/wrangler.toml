name = "gctrl-board"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
main = "src/worker.ts"

# Workers Static Assets — serves the Vite SPA build output
[assets]
directory = "dist-web"
binding = "ASSETS"

# SPA routing: serve index.html for all unmatched paths
# so client-side routing (e.g. /projects/*) works correctly
[assets.serving]
not_found_handling = "single-page-application"

# D1 database for board state (projects, issues, comments, events)
[[d1_databases]]
binding = "DB"
database_name = "gctrl-board-db"
database_id = "4b40671f-5e06-43b0-ad68-23434aeaca1e"
migrations_dir = "migrations"

# ── Preview environment (PR deploys) ──
[env.preview]
name = "gctrl-board-preview"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "gctrl-board-preview-db"
database_id = "90820d6b-e1c8-4f7d-a80d-536e9ce748bd"
migrations_dir = "migrations"
