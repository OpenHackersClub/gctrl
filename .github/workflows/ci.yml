name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  # ──────────────────────────────────────────────
  # Rust kernel — build & test
  # ──────────────────────────────────────────────
  rust:
    name: Rust (build + test)
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

      # Upload the built kernel binary for the Playwright job
      - name: Upload kernel binary
        uses: actions/upload-artifact@v4
        with:
          name: gctrl-kernel
          path: target/debug/gctrld
          retention-days: 1

  # ──────────────────────────────────────────────
  # TypeScript — install, lint, test, build
  # ──────────────────────────────────────────────
  typescript:
    name: TypeScript (lint + test + build)
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node

      - name: Biome lint
        run: pnpm exec biome lint shell/*/src/ apps/*/src/

      - name: Test — shell
        run: pnpm test
        working-directory: shell/gctrl-shell

      - name: Test — board
        run: pnpm test
        working-directory: apps/gctrl-board

      # Build web assets first: wrangler.toml references dist-web/ for [assets],
      # and the Workers runtime test harness loads that config.
      - name: Build — board web
        run: pnpm build:web
        working-directory: apps/gctrl-board

      - name: Test — board Workers runtime
        run: pnpm test:workers
        working-directory: apps/gctrl-board

      # Upload web assets for deploy and Playwright jobs
      - name: Upload board web assets
        uses: actions/upload-artifact@v4
        with:
          name: board-web-dist
          path: apps/gctrl-board/dist-web/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Playwright acceptance tests
  # ──────────────────────────────────────────────
  playwright:
    name: Playwright acceptance tests
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 20
    needs: [rust, typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/gctrl-board

      - name: Download kernel binary
        uses: actions/download-artifact@v4
        with:
          name: gctrl-kernel
          path: target/debug/

      - name: Make kernel binary executable
        run: chmod +x target/debug/gctrld

      - name: Run Playwright tests
        run: pnpm exec playwright test
        working-directory: apps/gctrl-board
        env:
          CI: "true"
          GCTRL_KERNEL_PORT: "14318"
          GCTRL_VITE_PORT: "14200"
          GCTRL_KERNEL_BIN: ${{ github.workspace }}/target/debug/gctrld

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/gctrl-board/playwright-report/
          retention-days: 7
