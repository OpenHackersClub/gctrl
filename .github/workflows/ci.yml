name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  # ──────────────────────────────────────────────
  # Rust kernel — build & test
  # ──────────────────────────────────────────────
  rust:
    name: Rust (build + test)
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

      # Upload the built kernel binary for the Playwright job
      - name: Upload kernel binary
        uses: actions/upload-artifact@v4
        with:
          name: gctl-kernel
          path: target/debug/gctl
          retention-days: 1

  # ──────────────────────────────────────────────
  # TypeScript — install, lint, test, build
  # ──────────────────────────────────────────────
  typescript:
    name: TypeScript (lint + test + build)
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node

      - name: Biome lint
        run: pnpm exec biome lint shell/*/src/ apps/*/src/

      - name: Test — shell
        run: pnpm test
        working-directory: shell/gctl-shell

      - name: Test — board
        run: pnpm test
        working-directory: apps/gctl-board

      - name: Build — board web
        run: pnpm build:web
        working-directory: apps/gctl-board

      # Upload web assets for deploy and Playwright jobs
      - name: Upload board web assets
        uses: actions/upload-artifact@v4
        with:
          name: board-web-dist
          path: apps/gctl-board/dist-web/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Playwright acceptance tests
  # ──────────────────────────────────────────────
  playwright:
    name: Playwright acceptance tests
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 20
    needs: [rust, typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/gctl-board

      - name: Download kernel binary
        uses: actions/download-artifact@v4
        with:
          name: gctl-kernel
          path: target/debug/

      - name: Make kernel binary executable
        run: chmod +x target/debug/gctl

      - name: Run Playwright tests
        run: pnpm exec playwright test
        working-directory: apps/gctl-board
        env:
          CI: "true"
          GCTL_KERNEL_PORT: "14318"
          GCTL_VITE_PORT: "14200"
          GCTL_KERNEL_BIN: ${{ github.workspace }}/target/debug/gctl

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/gctl-board/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Acceptance via Cloudflare Browser Rendering (CDP)
  # ──────────────────────────────────────────────
  acceptance-cdp:
    name: Acceptance (Cloudflare CDP)
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 20
    needs: [typescript]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node

      - name: Download board web assets
        uses: actions/download-artifact@v4
        with:
          name: board-web-dist
          path: apps/gctl-board/dist-web/

      - name: Ensure preview D1 database exists
        working-directory: apps/gctl-board
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DB_ID=$(pnpm exec wrangler d1 list --json 2>/dev/null | jq -r '.[] | select(.name == "gctl-board-preview-db") | .uuid // empty')
          if [ -z "$DB_ID" ]; then
            echo "Creating preview D1 database..."
            DB_ID=$(pnpm exec wrangler d1 create gctl-board-preview-db --json | jq -r '.uuid')
            echo "Created D1 database: $DB_ID"
          else
            echo "Found existing D1 database: $DB_ID"
          fi
          sed -i "s/database_id = \"preview\"/database_id = \"$DB_ID\"/" wrangler.toml

      - name: Run D1 migrations on preview
        working-directory: apps/gctl-board
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply gctl-board-preview-db --env preview --remote

      - name: Deploy preview to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/gctl-board
          command: deploy --env preview

      - name: Run acceptance tests (Cloudflare Browser Rendering)
        run: pnpm exec playwright test
        working-directory: apps/gctl-board
        env:
          CI: "true"
          CDP_ENDPOINT: "wss://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/browser-rendering/devtools/browser?keep_alive=600000"
          CF_API_TOKEN: ${{ secrets.CF_BROWSER_RENDERING_TOKEN }}
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-cdp
          path: apps/gctl-board/playwright-report/
          retention-days: 7
