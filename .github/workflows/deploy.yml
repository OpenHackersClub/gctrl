name: Deploy Board

on:
  # Gate on CI: only deploy after CI workflow succeeds on main
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  # Preview deploy on PR
  pull_request:
    paths:
      - "apps/gctl-board/**"
      - ".github/workflows/deploy.yml"
  # Manual trigger (builds from scratch, no CI gate)
  workflow_dispatch:

concurrency:
  group: deploy-board-${{ github.event.pull_request.number || 'production' }}
  cancel-in-progress: true

jobs:
  # ── Preview deploy (PR) ──
  preview:
    name: Deploy preview
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node

      - name: Build board web assets
        run: pnpm build:web
        working-directory: apps/gctl-board

      - name: Ensure preview D1 database exists
        working-directory: apps/gctl-board
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/ensure-preview-d1.mjs

      - name: Run D1 migrations on preview
        working-directory: apps/gctl-board
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply gctl-board-preview-db --env preview --remote

      - name: Deploy preview to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/gctl-board
          command: deploy --env preview

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            if (!url) return;
            const body = `### Preview deploy\n\n${url}\n\nDeployed from commit ${{ github.sha }}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('### Preview deploy'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── Production deploy (main) ──
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 15
    # Skip deploy if CI failed (workflow_run triggers on both success and failure)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node

      # Reuse board-web-dist artifact from CI when triggered by workflow_run
      - name: Download board web assets from CI
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: board-web-dist
          path: apps/gctl-board/dist-web/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Build from scratch only on manual dispatch (no CI artifact available)
      - name: Build board web assets
        if: github.event_name == 'workflow_dispatch'
        run: pnpm build:web
        working-directory: apps/gctl-board

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/gctl-board
          command: deploy

      - name: Post-deploy health check
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deployment-url }}"
          if [ -z "$DEPLOY_URL" ]; then
            echo "::warning::No deployment URL returned, skipping health check"
            exit 0
          fi
          echo "Checking $DEPLOY_URL ..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$DEPLOY_URL" --max-time 10 || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "::error::Health check failed after 3 attempts (last HTTP $STATUS)"
          exit 1
